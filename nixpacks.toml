[phases.install]
cmds = [
	"python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
	". /opt/venv/bin/activate && python -m playwright install-deps chromium",
	". /opt/venv/bin/activate && python -m playwright install chromium"
]

[start]
cmd = "python run_uvicorn.py"